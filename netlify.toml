[build]
  # This command works whether Netlify starts in the root or in the /frontend folder
  command = "if [ -d frontend ]; then npm install && cd frontend && npm install && npm run build; else npm install && npm run build; fi"
  
  # Publish directory relative to the root
  publish = "frontend/build"
  
  # Functions directory relative to the root
  functions = "netlify/functions"

[functions]
  node_bundle = true

[[redirects]]
  from = "/generate"
  to = "/.netlify/functions/api/generate"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
